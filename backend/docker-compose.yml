services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gridsense:gridsense@db:5432/gridsense_ai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: gridsense_ai
      POSTGRES_USER: gridsense
      POSTGRES_PASSWORD: gridsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridsense -d gridsense_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
